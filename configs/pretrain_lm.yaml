# Structured-Latents rollout for board-description pretraining
# Scope intentionally limited to pretrain_board_descriptions* family.

training:
  experiment_name: "chess_fusion_lm"
  output_dir: "checkpoints/simple_commentary"
  # Point this at a `.pt` sample directory exported by
  # Synthetic_commentary_generation via `chess_commentary dataset-export`.
  samples_dir: "800k_precomputed0"
  #resume_from_checkpoint: "checkpoints/recovered"

  # Secondary data mixing (grounding retention)
  #secondary_samples_dir: "800k_precomputed0"  # optional second exported sample directory
  #secondary_mix_ratio: 0.10    # fraction of primary dataset size
  #secondary_mix_seed: 42       # reproducible subset

  num_epochs: 10
  batch_size: 32
  gradient_accumulation_steps: 2
  learning_rate: 1.0e-4
  gradient_clip_val: null
  warmup_ratio: 0.015
  epoch_warmup_ratio: 0.005
  max_length: 512
  val_split: 0.025
  prepend_fen_in_prompt: false
  use_pgn_in_prompt: true
  pgn_prompt_last_n_moves: 5

  chess_token_weight_enabled: true
  chess_token_weight_squares: 3.0
  chess_token_weight_pieces: 2.0
  chess_token_weight_moves: 2.5
  chess_token_weight_sides: 1.5
  chess_token_weight_files: 1.5

  bf16: true
  gradient_checkpointing: false
  use_8bit_optimizer: true
  preload_dataset: false
  dataloader_num_workers: 4
  dataloader_prefetch_factor: 4
  dataloader_persistent_workers: true

  save_steps: 500
  logging_steps: 1
  max_steps_per_epoch: 100000
  use_wandb: true
  wandb_project: "chess-commentary"
  log_val_generations: true
  val_generation_samples: 2
  val_generation_max_new_tokens: 512
  val_generation_temperature: 0.7
  val_generation_log_path: "logs/val_generations_policy_only.txt"
  val_generation_log_wandb: true

  control_port: 8585
  control_poll_steps: 2

model:
  base_model: "TinyLlama/TinyLlama-1.1B-Chat-v1.0"
  #base_model: "Waterhorse/chessgpt-base-v1"

  load_in_8bit: false
  load_in_4bit: false
  bnb_4bit_compute_dtype: bf16
  use_flash_attention: true
  use_torch_compile: true
  use_lora: true
  mode: "chess_fusion"
  load_lm_checkpoint: false
  enable_lm: true

  chess_fusion:
    load_checkpoint_backbone: false
    load_checkpoint_csmp: true
    load_checkpoint_perceiver: true
    load_checkpoint_xattn: false
    load_checkpoint_prepend_latents: true
    load_checkpoint_lm_pseudotokens: false
    load_checkpoint_aux_heads: true

    use_cnn: false


    cnn_tap_layers: []
    tap_projection_dim: 1024
    use_transformer_taps: false

    use_chess_structure_mp: true
    csmp_layers: 8
    csmp_heads: 8
    csmp_dim: 1024
    csmp_pos_dim: 512
    csmp_piece_dim: 256
    csmp_ffn_mult: 4
    csmp_dropout: 0.2
    csmp_use_ray_mask: true
    csmp_use_attack_mask: true
    csmp_use_xy_coords: true
    csmp_relative_mode: none   # none | score_bias | edge_modulation
    csmp_relative_edge_dim: 16 # used only when csmp_relative_mode=edge_modulation
    csmp_ablation_no_mask: false

    use_absolute_coords: true

    # Structured latent regime
    structured_latents: true
    num_latents: 65
    perceiver_depth: 4
    perceiver_dim: 1024
    perceiver_heads: 16
    perceiver_dropout: 0.2
    use_engineered_concat: false
    latent_context_mask_type: strict_own_square
    global_latent_attends_all: true
    square_latent_attends_side_token: true
    square_heads_include_global_latent: true
    use_structured_policy_head: true
    structured_policy_query_layers: 2
    structured_policy_query_heads: 16
    structured_policy_ffn_mult: 2
    structured_policy_use_move_bias: true

    # Shared layer-conditioned readout
    num_fusion_tokens: 16
    readout_depth: 2
    shared_readout_fourier_dim: 64
    readout_use_policy_latent_cross_attention: true

    xattn_layers: [0, 4, 7, 11, 15, 18, 21]
    #xattn_layers: [1, 5, 9, 13, 17, 21, 25, 29, 31]
    xattn_mode: structured_square_mixer
    xattn_heads: 16
    xattn_gate_init: 0.0
    xattn_dropout: 0.1
    xattn_ffn_mult: 4
    xattn_recurrent_query_state_dim: 1024
    xattn_recurrent_query_use_mlp: true
    xattn_recurrent_query_share_gru_across_layers: true

    enable_lm_prepend_latents: true
    num_lm_prepend_latents: 64
    lm_prepend_latent_mode: structured_mlp
    lm_prepend_latents_use_positional_encoding: true

    enable_lm_pseudotokens: false
    num_lm_pseudotokens: 4
    lm_pseudotoken_layers: [0, 4, 7, 11, 15, 18, 21]

    aux_policy_weight: 1.0
    aux_eval_weight: 0.0      # deprecated position-bucket CE (disabled)
    num_eval_buckets: 5

    # Precomputed Maia policy: use cached maia_policy from .pt files
    # instead of running the teacher backbone during training (saves VRAM + compute)
    use_precomputed_policy: true

    # Per-move evaluation objective:
    # - CE on move-eval logits with soft Stockfish target distribution over top-k supervised moves
    # - Pairwise ranking on move-eval logits over top-k supervised moves
    # - MSE on dedicated eval projection scores for supervised move evals
    # Requires move_evals cached in exported `.pt` files from the data repo.
    aux_move_eval_weight: 0.1    # 0 = disabled; try 0.1 when data is ready
    move_eval_dim: 1024           # from/to projection dimension
    move_eval_cp_scale: 512.0    # normalize centipawn targets (1 pawn ~= 0.2)
    move_eval_cp_clip: 2000.0    # clip cp targets to [-2000, 2000] for CE/MSE stability
    move_eval_mse_weight: 1.0    # internal balance: MSE regression fraction
    move_eval_ce_weight: 0.1     # internal balance: CE fraction
    move_eval_pairwise_weight: 1.0  # internal balance: pairwise ranking fraction
    move_eval_pairwise_topk: 5      # top-k supervised moves used for pairwise ranking
    move_eval_pairwise_cp_margin: 10.0  # ignore pairs with cp gap <= margin
    move_eval_pairwise_temperature: 1.0  # temperature on predicted score differences
    move_eval_mate_weight: 1.0  # internal balance: mate BCE fraction
    move_eval_mate_threshold_cp: 9000.0  # |cp| >= threshold treated as mate target
    move_eval_ce_topk: 5         # top-k supervised moves used in soft CE targets
    move_eval_ce_cp_temperature: 128.0   # temperature (cp units) for soft target distribution

    bsr_weight: 0.5
    bsr_dim: 256
    bsr_heads: 4
    bsr_layers: 1
    bsr_dropout: 0.75

    spp_weight: 0.5
    spp_dim: 256
    spp_heads: 4
    spp_layers: 1
    spp_dropout: 0.75

    freeze_cnn: true
    freeze_transformer: true
    freeze_csmp: true
    freeze_perceiver: true
    freeze_xattn: false
    freeze_prepend_latents: false
    freeze_lm_pseudotokens: true

    cnn_learning_rate: 0.01
    perceiver_lr_ratio: 1
    csmp_lr_ratio: 1
    xattn_lr_ratio: 0.5
    prepend_latent_lr_ratio: 0.5
    pseudotoken_lr_ratio: 1.0
    lora_lr_ratio: 1.0

    lora:
      r: 32
      alpha: 64
      dropout: 0.05
      start_frozen: true
      unfreeze_epoch: 0
      progressive_merge: false
      target_modules: "auto"  # or explicitly: ["query_key_value", "dense", "dense_h_to_4h", "dense_4h_to_h"]

# --- Profiling ---------------------------------------------------------------
# Set enabled: true to activate. All sub-options are no-ops when enabled=false.
profiling:
  enabled: true
  nvtx_ranges: false
  # CUDA event timing: replaces time.time() in forward/backward - more accurate
  # under async GPU execution. Adds one synchronize() call per logged interval.
  cuda_event_timing: false

  # CSMP timing: adds CUDA event timing inside ChessStructureMP.forward()
  # (adds two synchronize() calls per CSMP forward — disable for production).
  csmp_timing: false

  # torch.profiler: export chrome trace for operator-level analysis.
  # Run with use_torch_compile: false for readable per-op breakdowns.
  torch_profiler: false
  torch_profiler_wait: 15        # warmup steps before profiling starts
  torch_profiler_warmup: 15      # profiler buffer warmup steps
  torch_profiler_active: 30      # steps to capture
  torch_profiler_output_dir: "profiler_output"

  # Peak GPU memory (MB) per forward/backward logged to wandb as prof/mem_*
  memory_snapshots: false

  # Route profiling metrics to wandb under prof/ prefix
  log_to_wandb: true

  # Emit component timing metrics every N global steps (0 = follow logging_steps)
  emit_interval: 50

  # Theoretical GPU peak TFLOPs for MFU calculation — update per machine:
  # RTX 3090 (bf16): 35.6 | RTX 4090 (bf16): 82.6 | A100 SXM (bf16): 312
  gpu_peak_tflops: 252   # RTX PRO 6000 Blackwell BF16 tensor-core TFLOPS (dense) (use 35.6 for RTX 3090, 82.6 for RTX 4090, 312 for A100 SXM)

